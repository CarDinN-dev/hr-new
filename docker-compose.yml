services:
  postgres:
    image: postgres:16-alpine
    init: true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: hr_erp
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: medtech-hr-erp-api:latest
    init: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/hr_erp?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:?set AUDIT_HMAC_KEY in .env}
      JWT_EXPIRES_IN: 8h
      MICROSOFT_LOGIN_ENABLED: ${MICROSOFT_LOGIN_ENABLED:-false}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_PROVISIONING_ENABLED: ${MICROSOFT_PROVISIONING_ENABLED:-false}
      MICROSOFT_PROVISIONING_TENANT_ID: ${MICROSOFT_PROVISIONING_TENANT_ID:-}
      MICROSOFT_PROVISIONING_CLIENT_ID: ${MICROSOFT_PROVISIONING_CLIENT_ID:-}
      MICROSOFT_PROVISIONING_CLIENT_SECRET: ${MICROSOFT_PROVISIONING_CLIENT_SECRET:-}
      MICROSOFT_ENTERPRISE_APP_OBJECT_ID: ${MICROSOFT_ENTERPRISE_APP_OBJECT_ID:-}
      MICROSOFT_USER_APP_ROLE_ID: ${MICROSOFT_USER_APP_ROLE_ID:-}
      GCS_DOCUMENTS_BUCKET: ${GCS_DOCUMENTS_BUCKET:?set GCS_DOCUMENTS_BUCKET in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        test -n "$$GCS_DOCUMENTS_BUCKET" || { echo "GCS_DOCUMENTS_BUCKET is required" >&2; exit 1; }
        if [ "$$MICROSOFT_LOGIN_ENABLED" = "true" ]; then
          test -n "$$MICROSOFT_TENANT_ID" || { echo "MICROSOFT_TENANT_ID is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_CLIENT_ID" || { echo "MICROSOFT_CLIENT_ID is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_CLIENT_SECRET" || { echo "MICROSOFT_CLIENT_SECRET is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_REDIRECT_URI" || { echo "MICROSOFT_REDIRECT_URI is required when Microsoft login is enabled" >&2; exit 1; }
        fi
        npx prisma migrate deploy
        exec node dist/main.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  hr-erp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    image: medtech-hr-erp:latest
    init: true
    security_opt: ["no-new-privileges:true"]
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres_data:
