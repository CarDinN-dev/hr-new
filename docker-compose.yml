services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    init: true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: hr_erp
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 1536m
    cpus: 1.5
    pids_limit: 256
    stop_grace_period: 60s
    security_opt: ["no-new-privileges:true"]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: medtech-hr-erp-api:latest
    init: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/hr_erp?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:?set AUDIT_HMAC_KEY in .env}
      JWT_EXPIRES_IN: 8h
      MICROSOFT_LOGIN_ENABLED: ${MICROSOFT_LOGIN_ENABLED:-false}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_PROVISIONING_ENABLED: ${MICROSOFT_PROVISIONING_ENABLED:-false}
      MICROSOFT_PROVISIONING_TENANT_ID: ${MICROSOFT_PROVISIONING_TENANT_ID:-}
      MICROSOFT_PROVISIONING_CLIENT_ID: ${MICROSOFT_PROVISIONING_CLIENT_ID:-}
      MICROSOFT_PROVISIONING_CLIENT_SECRET: ${MICROSOFT_PROVISIONING_CLIENT_SECRET:-}
      MICROSOFT_ENTERPRISE_APP_OBJECT_ID: ${MICROSOFT_ENTERPRISE_APP_OBJECT_ID:-}
      MICROSOFT_USER_APP_ROLE_ID: ${MICROSOFT_USER_APP_ROLE_ID:-}
      GCS_DOCUMENTS_BUCKET: ${GCS_DOCUMENTS_BUCKET:?set GCS_DOCUMENTS_BUCKET in .env}
      DOCUMENT_SCAN_ENABLED: ${DOCUMENT_SCAN_ENABLED:-true}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        test -n "$$GCS_DOCUMENTS_BUCKET" || { echo "GCS_DOCUMENTS_BUCKET is required" >&2; exit 1; }
        if [ "$$MICROSOFT_LOGIN_ENABLED" = "true" ]; then
          test -n "$$MICROSOFT_TENANT_ID" || { echo "MICROSOFT_TENANT_ID is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_CLIENT_ID" || { echo "MICROSOFT_CLIENT_ID is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_CLIENT_SECRET" || { echo "MICROSOFT_CLIENT_SECRET is required when Microsoft login is enabled" >&2; exit 1; }
          test -n "$$MICROSOFT_REDIRECT_URI" || { echo "MICROSOFT_REDIRECT_URI is required when Microsoft login is enabled" >&2; exit 1; }
        fi
        exec node dist/main.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  hr-erp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    image: medtech-hr-erp:latest
    init: true
    security_opt: ["no-new-privileges:true"]
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop: [ALL]
    cap_add: [CHOWN, NET_BIND_SERVICE, SETGID, SETUID]
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  clamav:
    image: clamav/clamav:1.4_base@sha256:d54ef59d5d07ff243c669789f51e0c3d9dfa9945f62b515be84febe8e1db0dbf
    init: true
    volumes:
      - clamav_db:/var/lib/clamav
    restart: unless-stopped
    mem_limit: 4g
    cpus: 1.0
    pids_limit: 256
    security_opt: ["no-new-privileges:true"]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres_data:
  clamav_db:
